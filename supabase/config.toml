# NOEMA — Configuración Supabase local
# https://supabase.com/docs/guides/cli/config

project_id = "noema"

[api]
enabled = true
port = 54621
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54622
shadow_port = 54620
major_version = 15

[db.pooler]
enabled = false
port = 54629
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54623
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54624
smtp_port = 54625
pop3_port = 54626

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000", "noema://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# En desarrollo local desactivamos confirmación porque Supabase local NO manda
# correos reales (los captura Mailpit en http://127.0.0.1:54624).
# En producción esto debe ser `true`.
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
